<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator – CalcApp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .calc-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    .user-bar {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.15); padding: 10px 20px;
      border-radius: 50px; color: white;
    }
    .user-bar img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid white; }
    .user-bar span { font-weight: 600; font-size: 0.95rem; }
    .logout-btn {
      margin-left: 12px; padding: 6px 16px;
      background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.5);
      border-radius: 20px; color: white; cursor: pointer; font-size: 0.85rem;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.4); }

    .calculator {
      background: white; border-radius: 20px;
      padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 320px;
    }

    .display-box {
      background: #1e1e2e; border-radius: 12px;
      padding: 16px; margin-bottom: 16px; text-align: right;
    }
    .display-expr { color: #888; font-size: 0.85rem; min-height: 18px; word-break: break-all; }
    .display-result { color: white; font-size: 2.2rem; font-weight: 700; min-height: 44px; word-break: break-all; }

    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    .btn {
      padding: 18px; font-size: 1.1rem; border: none;
      border-radius: 12px; cursor: pointer; font-weight: 600;
      transition: transform 0.1s, filter 0.15s;
    }
    .btn:active { transform: scale(0.93); }
    .btn:hover  { filter: brightness(0.9); }

    .btn-num   { background: #f0f0f5; color: #333; }
    .btn-op    { background: #667eea; color: white; }
    .btn-eq    { background: #764ba2; color: white; grid-column: span 2; }
    .btn-clear { background: #ff6b6b; color: white; }
    .btn-del   { background: #ffa94d; color: white; }
  </style>
</head>
<body>
  <div class="calc-wrapper">

    <!-- User bar -->
    <div class="user-bar">
      <img id="userPhoto" src="" alt="avatar">
      <span id="userName">Loading...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Calculator -->
    <div class="calculator">
      <div class="display-box">
        <div class="display-expr" id="expr"></div>
        <div class="display-result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-clear" onclick="clearAll()">C</button>
        <button class="btn btn-del"   onclick="deleteLast()">⌫</button>
        <button class="btn btn-op"    onclick="inputVal('%')">%</button>
        <button class="btn btn-op"    onclick="inputVal('/')">÷</button>

        <button class="btn btn-num" onclick="inputVal('7')">7</button>
        <button class="btn btn-num" onclick="inputVal('8')">8</button>
        <button class="btn btn-num" onclick="inputVal('9')">9</button>
        <button class="btn btn-op"  onclick="inputVal('*')">×</button>

        <button class="btn btn-num" onclick="inputVal('4')">4</button>
        <button class="btn btn-num" onclick="inputVal('5')">5</button>
        <button class="btn btn-num" onclick="inputVal('6')">6</button>
        <button class="btn btn-op"  onclick="inputVal('-')">−</button>

        <button class="btn btn-num" onclick="inputVal('1')">1</button>
        <button class="btn btn-num" onclick="inputVal('2')">2</button>
        <button class="btn btn-num" onclick="inputVal('3')">3</button>
        <button class="btn btn-op"  onclick="inputVal('+')">+</button>

        <button class="btn btn-num" onclick="inputVal('0')">0</button>
        <button class="btn btn-num" onclick="inputVal('.')">.</button>
        <button class="btn btn-eq"  onclick="calculate()">=</button>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <script>
    let expression = '';

    const exprEl   = document.getElementById('expr');
    const resultEl = document.getElementById('result');

    // Auth guard — redirect to login if not signed in
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = '/';
      } else {
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userPhoto').src = user.photoURL;
      }
    });

    function inputVal(val) {
      expression += val;
      exprEl.textContent = expression.replace(/\*/g, '×').replace(/\//g, '÷');
      // Live preview
      try {
        const res = Function('"use strict"; return (' + expression + ')')();
        if (isFinite(res)) resultEl.textContent = parseFloat(res.toFixed(10));
      } catch { /* incomplete expression, ignore */ }
    }

    function clearAll() {
      expression = '';
      exprEl.textContent = '';
      resultEl.textContent = '0';
    }

    function deleteLast() {
      expression = expression.slice(0, -1);
      exprEl.textContent = expression.replace(/\*/g, '×').replace(/\//g, '÷');
      if (!expression) resultEl.textContent = '0';
    }

    function calculate() {
      try {
        const res = Function('"use strict"; return (' + expression + ')')();
        resultEl.textContent = parseFloat(res.toFixed(10)).toString();
        exprEl.textContent = expression.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';
        expression = res.toString();
      } catch {
        resultEl.textContent = 'Error';
        expression = '';
      }
    }

    function logout() {
      auth.signOut().then(() => { window.location.href = '/'; });
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if ('0123456789.+-*/%'.includes(e.key)) inputVal(e.key);
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
